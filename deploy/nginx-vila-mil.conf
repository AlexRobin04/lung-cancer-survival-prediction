# 复制到 /etc/nginx/sites-available/vila-mil 后软链到 sites-enabled
# 修改：root 路径、server_name（域名或 _）
# 测试：sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name _;

    # 前端构建产物（npm run build 后的 dist）
    root /srv/vila-mil/vila-mil-frontend/dist;
    index index.html;

    # SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Flask API（与前端 VITE_API_BASE_URL=/api 一致）
    location /api {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        client_max_body_size 2G;
    }
}
